<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>roto-master · protótipo navegável v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body class="screen-home">

  <!-- chrome global (sempre visível) -->
  <header class="chrome">
    <div class="chrome-left">
      <a href="#/" class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-name">roto<span class="dim">·</span>master</span>
        <span class="brand-mod">esteira</span>
      </a>

      <div class="chrome-menu">
        <button class="chrome-link" id="wb-menu-btn">
          <span>workbench</span>
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 3l3.5 3 3.5-3" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <div class="dropdown" id="wb-menu">
          <a href="#/wb/videos"     class="dd-item"><span class="dd-num">01</span><span>vídeos</span></a>
          <a href="#/wb/characters" class="dd-item"><span class="dd-num">02</span><span>personagens</span></a>
          <a href="#/wb/framings"   class="dd-item"><span class="dd-num">03</span><span>enquadramentos</span></a>
          <a href="#/wb/cameras"    class="dd-item"><span class="dd-num">04</span><span>câmeras salvas</span></a>
        </div>
      </div>
    </div>

    <div class="chrome-center"></div>

    <div class="chrome-right">
      <div class="user-pill">
        <span class="user-dot"></span>
        <span id="user-pill">manu@did.lu</span>
      </div>
    </div>
  </header>

  <!-- screens -->
  <main class="screen" data-screen="home">
    <div class="screen-inner"></div>
  </main>

  <main class="screen" data-screen="project">
    <div class="screen-inner"></div>
  </main>

  <main class="screen" data-screen="workbench">
    <div class="screen-inner"></div>
  </main>

  <!-- editor: shell diferente (tela cheia, sem padding wrapper) -->
  <main class="screen screen-editor" data-screen="editor">
    <div class="editor-host"></div>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
